name: Pet the cat

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  pet-cat:
    if: github.event.issue.title == 'pet the cat'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update README cat block
        run: |
          python3 << 'PY'
          from pathlib import Path
          import re

          readme = Path("README.md")
          text = readme.read_text(encoding="utf-8")

          pets_file = Path(".pets_count")
          if pets_file.exists():
              try:
                  pets = int(pets_file.read_text(encoding="utf-8").strip())
              except:
                  pets = 0
          else:
              pets = 0

          pets += 1
          pets_file.write_text(str(pets), encoding="utf-8")

          if pets % 4 == 1:
              mood = "happy"
              status = "purring loudly"
              face = "( ^.^ )"
          elif pets % 4 == 2:
              mood = "playful"
              status = "chasing the contribution snake"
              face = "( o.o )"
          elif pets % 4 == 3:
              mood = "very cuddly"
              status = "sitting on your keyboard"
              face = "( =^.^= )"
          else:
              mood = "sleepy but loved"
              status = "taking a cozy nap"
              face = "( -.- )"

          new_block = f'''<!-- CAT-START -->
```text
 /\\_/\\\\
{face}
 > ^ <
mood: {mood}
status: {status}
pets: {pets}
